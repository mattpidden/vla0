# Full fine-tuning on all 10 LIBERO-Spatial tasks (432 episodes).
# Hyperparameters match the VLA-0 paper exactly.
# Per-task episode count (~43) is the same as the full paper training,
# so 24 epochs gives equivalent per-task exposure.
EXP:
  EXP_ID: "libero_spatial"
  MODEL: "qwen"
  LR_SCHED: "none"
  AMP: True
  OPTIMIZER: "adamw"

TRAIN:
  lr: 5e-6
  num_epochs: 24
  clip_grad_norm: 0.0
  l2: 1e-10

EXP_EXTRA:
  save_ckp: 2
  save_last_ckpt: True

DATALOADER:
  batch_size: 8
  num_workers: 3
  ROBOVERSE:
    cfg_path: libs/RoboVerse/roboverse/configs/img_libero_aug_spatial.yaml
    cfg_opts: IMAGE.crop_img:0.875:IMAGE.img_size:224:IMAGE.cam_list:('3p1','3p2')

MODEL:
  QWEN:
    add_vision_id: True
    use_lora: False
    use_qlora: False
    use_flash_attention_2: False
    rgb_img_size: 224,224
    original_action_dim: 7
    action_mask_aug_per: 0.4
    num_cam: 2
    tiled_rgb_imgs: True
