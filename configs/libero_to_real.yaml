# Sim-to-real fine-tuning: LIBERO pre-trained weights → SO101 real world.
#
# Key decisions:
#   - qwen_model_id: loads from LIBERO-trained model_last/ directory instead of
#     base Qwen weights. from_pretrained() accepts local paths. This gives the
#     model LIBERO's action format priors as the starting point.
#   - use_lora: False — full fine-tune. LoRA was tried first and underperformed;
#     this run gives the model full capacity to adapt to the real-world domain.
#   - clip_grad_norm: 1.0 — full fine-tuning touches all 3.7B params with no LR
#     warmup available in this codebase, so clipping is needed to prevent large
#     gradients from destabilizing training (loss plateaued/rose without it).
#   - original_action_dim: 6 — SO101 has 6 DOF (vs LIBERO's 7). The LM backbone
#     is unchanged; it just predicts 48 tokens (6×8) instead of 56 (7×8).
#   - lr: 1.5e-6 — 5e-7 + clip_grad_norm:1.0 was stable but barely moved (3.5→3.0
#     over 33% of epoch 0). Pushing LR back up since clipping now guards against
#     the instability that the original 1e-6 (uncapped) run hit.
#   - num_epochs: 15 — sufficient for a 400-episode dataset. More risks overfitting.
EXP:
  EXP_ID: "libero_to_real_full"
  MODEL: "qwen"
  LR_SCHED: "none"
  AMP: True
  OPTIMIZER: "adamw"

TRAIN:
  lr: 1.5e-6
  num_epochs: 15
  clip_grad_norm: 1.0
  l2: 1e-10

EXP_EXTRA:
  save_ckp: 2
  save_last_ckpt: True

DATALOADER:
  batch_size: 8
  num_workers: 3
  ROBOVERSE:
    cfg_path: libs/RoboVerse/roboverse/configs/libero_to_real.yaml
    cfg_opts: IMAGE.crop_img:0.875:IMAGE.img_size:224:IMAGE.cam_list:('3p1','3p2')

MODEL:
  QWEN:
    qwen_model_id: ./runs/paper_original/model_last
    add_vision_id: True
    use_lora: False
    use_qlora: False
    use_flash_attention_2: False
    rgb_img_size: 224,224
    original_action_dim: 6
    action_mask_aug_per: 0.4
    num_cam: 2
    tiled_rgb_imgs: True
