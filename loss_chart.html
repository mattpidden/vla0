---
layout: default
title: VLA0 Training Loss
---
<style>
  .viz-root {
    --surface-1:      #fcfcfb;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --gridline:       #e1e0d9;
    --baseline:       #c3c2b7;
    --border:         rgba(11,11,11,0.10);
    --series-1:       #2a78d6;
    --series-1-fill:  rgba(42,120,214,0.08);
  }
  @media (prefers-color-scheme: dark) {
    .viz-root {
      --surface-1:      #1a1a19;
      --text-primary:   #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted:     #898781;
      --gridline:       #2c2c2a;
      --baseline:       #383835;
      --border:         rgba(255,255,255,0.10);
      --series-1:       #3987e5;
      --series-1-fill:  rgba(57,135,229,0.10);
    }
  }
  :root[data-theme="dark"] .viz-root {
    --surface-1:      #1a1a19;
    --text-primary:   #ffffff;
    --text-secondary: #c3c2b7;
    --text-muted:     #898781;
    --gridline:       #2c2c2a;
    --baseline:       #383835;
    --border:         rgba(255,255,255,0.10);
    --series-1:       #3987e5;
    --series-1-fill:  rgba(57,135,229,0.10);
  }
  :root[data-theme="light"] .viz-root {
    --surface-1:      #fcfcfb;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --gridline:       #e1e0d9;
    --baseline:       #c3c2b7;
    --border:         rgba(11,11,11,0.10);
    --series-1:       #2a78d6;
    --series-1-fill:  rgba(42,120,214,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    color: var(--text-primary, #0b0b0b);
  }
  .viz-root {
    background: var(--surface-1);
    border-radius: 8px;
    border: 1px solid var(--border);
    padding: 24px 24px 20px;
    max-width: 820px;
    position: relative;
  }
  .chart-header { margin-bottom: 20px; }
  .chart-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.3;
  }
  .chart-subtitle {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 3px;
  }
  .chart-area { position: relative; width: 100%; }
  svg { display: block; width: 100%; overflow: visible; }
  .grid-line { stroke: var(--gridline); stroke-width: 1; }
  .axis-line { stroke: var(--baseline); stroke-width: 1; }
  .tick-label {
    fill: var(--text-muted);
    font-size: 11px;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    font-variant-numeric: tabular-nums;
  }
  .axis-label {
    fill: var(--text-secondary);
    font-size: 11px;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  .data-line {
    stroke: var(--series-1);
    stroke-width: 2;
    fill: none;
    stroke-linejoin: round;
    stroke-linecap: round;
  }
  .data-fill { fill: var(--series-1-fill); }
  .crosshair-line {
    stroke: var(--text-muted);
    stroke-width: 1;
    stroke-dasharray: 3 3;
    pointer-events: none;
    opacity: 0;
  }
  .hover-dot {
    fill: var(--surface-1);
    stroke: var(--series-1);
    stroke-width: 2;
    pointer-events: none;
    opacity: 0;
  }
  .hit-area { fill: transparent; cursor: crosshair; }
  .tooltip {
    position: absolute;
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
    white-space: nowrap;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  }
  .tooltip.visible { opacity: 1; }
  .tooltip-epoch { color: var(--text-secondary); margin-bottom: 3px; }
  .tooltip-loss {
    color: var(--text-primary);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tooltip-swatch {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--series-1);
    flex-shrink: 0;
  }
</style>

<div class="viz-root">
  <div class="chart-header">
    <div class="chart-title">Training Loss — VLA0 Qwen2.5-VL-3B Real-World</div>
    <div class="chart-subtitle">Average cross-entropy loss per epoch · Epochs 0–44 complete (45 of 100)</div>
  </div>
  <div class="chart-area">
    <svg id="chart-svg" viewBox="0 0 760 300" aria-label="Line chart showing training loss decreasing from 0.694 at epoch 0 to 0.407 at epoch 44"></svg>
    <div class="tooltip" id="tooltip">
      <div class="tooltip-epoch" id="tt-epoch"></div>
      <div class="tooltip-loss"><span class="tooltip-swatch"></span><span id="tt-loss"></span></div>
    </div>
  </div>
</div>

<script>
  const data = [
    {epoch:0,  loss:0.6945},
    {epoch:1,  loss:0.6262},
    {epoch:2,  loss:0.5986},
    {epoch:3,  loss:0.5762},
    {epoch:4,  loss:0.5577},
    {epoch:5,  loss:0.5429},
    {epoch:6,  loss:0.5297},
    {epoch:7,  loss:0.5177},
    {epoch:8,  loss:0.5072},
    {epoch:9,  loss:0.4982},
    {epoch:10, loss:0.4901},
    {epoch:11, loss:0.4833},
    {epoch:12, loss:0.4763},
    {epoch:13, loss:0.4711},
    {epoch:14, loss:0.4657},
    {epoch:15, loss:0.4607},
    {epoch:16, loss:0.4563},
    {epoch:17, loss:0.4524},
    {epoch:18, loss:0.4484},
    {epoch:19, loss:0.4451},
    {epoch:20, loss:0.4422},
    {epoch:21, loss:0.4390},
    {epoch:22, loss:0.4365},
    {epoch:23, loss:0.4339},
    {epoch:24, loss:0.4316},
    {epoch:25, loss:0.4297},
    {epoch:26, loss:0.4281},
    {epoch:27, loss:0.4260},
    {epoch:28, loss:0.4240},
    {epoch:29, loss:0.4223},
    {epoch:30, loss:0.4212},
    {epoch:31, loss:0.4196},
    {epoch:32, loss:0.4181},
    {epoch:33, loss:0.4165},
    {epoch:34, loss:0.4155},
    {epoch:35, loss:0.4144},
    {epoch:36, loss:0.4133},
    {epoch:37, loss:0.4124},
    {epoch:38, loss:0.4116},
    {epoch:39, loss:0.4111},
    {epoch:40, loss:0.4103},
    {epoch:41, loss:0.4093},
    {epoch:42, loss:0.4083},
    {epoch:43, loss:0.4080},
    {epoch:44, loss:0.4070},
  ];

  const W = 760, H = 300;
  const ML = 52, MR = 20, MT = 12, MB = 36;
  const plotW = W - ML - MR, plotH = H - MT - MB;
  const minLoss = 0.38, maxLoss = 0.72;
  const maxEpoch = data[data.length - 1].epoch;

  function xScale(e) { return ML + (e / maxEpoch) * plotW; }
  function yScale(l) { return MT + (1 - (l - minLoss) / (maxLoss - minLoss)) * plotH; }

  const svg = document.getElementById('chart-svg');
  function el(tag, attrs, text) {
    const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
    for (const [k, v] of Object.entries(attrs || {})) e.setAttribute(k, v);
    if (text !== undefined) e.textContent = text;
    return e;
  }

  // Grid + y-axis ticks
  for (const y of [0.40, 0.45, 0.50, 0.55, 0.60, 0.65, 0.70]) {
    const yy = yScale(y);
    svg.appendChild(el('line', { class:'grid-line', x1:ML, x2:ML+plotW, y1:yy, y2:yy }));
    svg.appendChild(el('text', { class:'tick-label', x:ML-6, y:yy+4, 'text-anchor':'end' }, y.toFixed(2)));
  }

  // X-axis ticks
  for (const e of [0,4,8,12,16,20,24,28,32,36,40,44]) {
    const xx = xScale(e);
    svg.appendChild(el('line', { class:'axis-line', x1:xx, x2:xx, y1:MT+plotH, y2:MT+plotH+4 }));
    svg.appendChild(el('text', { class:'tick-label', x:xx, y:MT+plotH+16, 'text-anchor':'middle' }, e));
  }

  // Axes
  svg.appendChild(el('line', { class:'axis-line', x1:ML, x2:ML+plotW, y1:MT+plotH, y2:MT+plotH }));
  svg.appendChild(el('line', { class:'axis-line', x1:ML, x2:ML, y1:MT, y2:MT+plotH }));
  svg.appendChild(el('text', { class:'axis-label', x:ML+plotW/2, y:H-2, 'text-anchor':'middle' }, 'Epoch'));
  svg.appendChild(el('text', { class:'axis-label', transform:'rotate(-90)', x:-(MT+plotH/2), y:13, 'text-anchor':'middle' }, 'Avg Loss'));

  // Area fill
  const pts = data.map(d => `${xScale(d.epoch).toFixed(1)},${yScale(d.loss).toFixed(1)}`).join(' L ');
  const baseY = (MT+plotH).toFixed(1);
  svg.appendChild(el('path', { class:'data-fill', d:`M ${xScale(0).toFixed(1)},${baseY} L ${pts} L ${xScale(maxEpoch).toFixed(1)},${baseY} Z` }));

  // Line
  svg.appendChild(el('path', { class:'data-line', d:'M '+data.map(d=>`${xScale(d.epoch).toFixed(1)},${yScale(d.loss).toFixed(1)}`).join(' L ') }));

  // Crosshair + dots
  const crossV = el('line', { class:'crosshair-line', x1:0, x2:0, y1:MT, y2:MT+plotH });
  svg.appendChild(crossV);
  const dots = data.map(d => {
    const dot = el('circle', { class:'hover-dot', r:'4', cx:xScale(d.epoch), cy:yScale(d.loss) });
    svg.appendChild(dot);
    return dot;
  });
  svg.appendChild(el('rect', { class:'hit-area', x:ML, y:MT, width:plotW, height:plotH }));

  // Interaction
  const tooltip = document.getElementById('tooltip');
  let activeIdx = -1;
  const hitRect = svg.querySelector('.hit-area');

  hitRect.addEventListener('mousemove', ev => {
    const rect = svg.getBoundingClientRect();
    const mx = (ev.clientX - rect.left) * (W / rect.width);
    const idx = Math.max(0, Math.min(data.length-1, Math.round((mx - ML) / plotW * maxEpoch)));
    if (idx === activeIdx) return;
    activeIdx = idx;
    const d = data[idx];
    crossV.setAttribute('x1', xScale(d.epoch)); crossV.setAttribute('x2', xScale(d.epoch)); crossV.style.opacity = 1;
    dots.forEach((dot, i) => { dot.style.opacity = i === idx ? 1 : 0; });
    document.getElementById('tt-epoch').textContent = `Epoch ${d.epoch}`;
    document.getElementById('tt-loss').textContent = `Loss: ${d.loss.toFixed(4)}`;
    const ca = tooltip.closest('.chart-area').getBoundingClientRect();
    tooltip.style.left = Math.min(ev.clientX - ca.left + 12, ca.width - 160) + 'px';
    tooltip.style.top  = Math.max(4, ev.clientY - ca.top - 40) + 'px';
    tooltip.classList.add('visible');
  });

  hitRect.addEventListener('mouseleave', () => {
    activeIdx = -1;
    crossV.style.opacity = 0;
    dots.forEach(dot => { dot.style.opacity = 0; });
    tooltip.classList.remove('visible');
  });
</script>
